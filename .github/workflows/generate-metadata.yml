name: Generate Cheatsheet Metadata

# Runs on every commit. Scans all cheatsheet HTML files, extracts selected
# metadata, and uploads cheatsheets.json as a build artifact. Nothing is
# committed back to the repo, so there is no risk of a re-trigger loop.

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip beautifulsoup4 lxml

      - name: Generate metadata JSON
        run: python generate-metadata.py --output cheatsheets.json

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: cheatsheets-metadata
          path: cheatsheets.json
          if-no-files-found: error
