# Permanent redirects for retired cheatsheet URLs.
#
# Deployed to /var/www/cheatsheets.davidveksler.com/conf/nginx/redirects.conf,
# which the vhost pulls in via `include .../conf/nginx/*.conf;` inside its
# server block. Tracked here because the server has no backups of its own.
#
# `location =` is an exact match and takes precedence over the `location /`
# prefix match in php-routing.conf, so these win over the `=404` fallback.
#
# anduril-products.html was the site's top page (785 clicks / 162k impressions
# over the six months to 2026-03-02) before it was withdrawn. It was renamed to
# defense-autonomy-platforms.html in 5a5db5e and deleted in a9ad22b; neither URL
# has an heir. Both now point at the multi-vendor category page that replaced
# them. Roughly 105 requests/day still arrive at the first URL.

location = /anduril-products.html {
    return 301 /autonomous-defense-systems.html;
}

location = /defense-autonomy-platforms.html {
    return 301 /autonomous-defense-systems.html;
}
